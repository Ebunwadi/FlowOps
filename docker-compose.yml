name: flowops

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: flowops-postgres
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  adminer:
    image: adminer:${ADMINER_VERSION:-4.8.1}
    container_name: flowops-adminer
    env_file:
      - .env
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.0.7}
    container_name: flowops-keycloak
    command: start-dev --import-realm
    env_file:
      - .env
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  seq:
    image: datalust/seq:${SEQ_VERSION:-2024.3}
    container_name: flowops-seq
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "${SEQ_PORT:-5341}:80"
    volumes:
      - seq_data:/data
    restart: unless-stopped

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: flowops-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: ./flowops-api
      dockerfile: Dockerfile
      target: development
    container_name: flowops-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      SEQ_SERVER_URL: http://seq:80
      KEYCLOAK_ISSUER: http://localhost:8080/realms/${KEYCLOAK_REALM:-flowops}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-flowops}/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: flowops-web
      REDIS_URL: redis://redis:6379
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./flowops-api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    command: sh -c "npm install && npx prisma migrate deploy && npm run dev"
    restart: unless-stopped

  worker:
    build:
      context: ./flowops-api
      dockerfile: Dockerfile
      target: development
    container_name: flowops-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      SEQ_SERVER_URL: http://seq:80
      REDIS_URL: redis://redis:6379
    volumes:
      - ./flowops-api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    command: sh -c "npm install && npm run worker:dev"
    restart: unless-stopped

  web:
    build:
      context: ./flowops-web
      dockerfile: Dockerfile
      target: development
    container_name: flowops-web
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./flowops-web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
      - keycloak
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped

volumes:
  api_node_modules:
  keycloak_data:
  postgres_data:
  redis_data:
  seq_data:
  web_node_modules:
