name: flowops

services:
  api:
    build:
      context: ./flowops-api
      dockerfile: Dockerfile
      target: development
    container_name: flowops-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      API_PREFIX: /api
      LOG_LEVEL: info
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./flowops-api:/app
      - api_node_modules:/app/node_modules
    restart: unless-stopped

  web:
    build:
      context: ./flowops-web
      dockerfile: Dockerfile
      target: development
    container_name: flowops-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    volumes:
      - ./flowops-web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_node_modules:
  web_node_modules:
